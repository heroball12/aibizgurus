services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py seed_industries && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aibg
      POSTGRES_USER: aibg
      POSTGRES_PASSWORD: aibg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
volumes:
  postgres_data:
