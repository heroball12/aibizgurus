services:
  - type: web
    name: ai-business-gurus
    runtime: python
    plan: starter
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers $WEB_CONCURRENCY --timeout 120
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-business-gurus-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: aibiz.guru,www.aibiz.guru,.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://aibiz.guru,https://www.aibiz.guru
      - key: PUBLIC_BASE_URL
        value: https://aibiz.guru
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DB_CONN_MAX_AGE
        value: "600"
      - key: DB_SSL_REQUIRE
        value: "1"
      - key: SECURE_SSL_REDIRECT
        value: "1"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: CSRF_COOKIE_SECURE
        value: "1"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_PRELOAD
        value: "1"
      - key: WEB_CONCURRENCY
        value: "3"

databases:
  - name: ai-business-gurus-db
    plan: starter
